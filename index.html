<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eyeサポテストメール</title>

<style>
body {
  margin: 0;
  font-family: "Hiragino Mincho ProN", serif;
  background: url("https://hirocon-net.jp/wp-content/themes/hirocon/images/page/shop/toyohashi_large.jpg") no-repeat center center/cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(6px);
}

.container {
  position: relative;
  z-index: 1;
  width: 92%;
  max-width: 420px;
  padding: 35px 22px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255,248,240,0.95), rgba(245,230,210,0.95));
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  text-align: center;
}

.title {
  font-size: 24px;
  color: #4a2f1a;
  letter-spacing: 2px;
  margin-bottom: 15px;
}

.section-title {
  font-size: 13px;
  color: #7a5a3a;
  margin: 18px 0 8px;
}

.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px 0;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 15px;
  color: #3b2a1e;
  background: linear-gradient(145deg, #fff8f0, #e9d7c2);
  box-shadow: 5px 5px 12px rgba(0,0,0,0.25),
              -3px -3px 8px rgba(255,255,255,0.8);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.arrow {
  opacity: 0.5;
}

.note {
  margin-top: 18px;
  font-size: 12px;
  color: #4a2f1a;
  line-height: 1.6;
}

.signature {
  position: fixed;
  bottom: 18px;
  right: 22px;
  color: rgba(255,255,255,0.9);
  font-size: 13px;
}
</style>

<script>
// 共通設定
const config = {
  to: "customer-desk@hirocon-net.co.jp",
  subject: "eyeサポテストメール",
  body: "レンズを使用される方のお名前（漢字）\n⇒\n\nこちらはメールアドレス確認用のメールでございます。\nお名前をご入力いただき、そのまま送信をお願いいたします。"
};

const s = encodeURIComponent(config.subject);
const b = encodeURIComponent(config.body);

// 各メールサービスへのリンク生成
const mailLinks = {
  default: `mailto:${config.to}?subject=${s}&body=${b}`,
  gmail: `https://mail.google.com/mail/?view=cm&fs=1&to=${config.to}&su=${s}&body=${b}`,
  yahoo: `https://compose.mail.yahoo.co.jp/?to=${config.to}&ss=${s}&body=${b}`,
  outlook: `https://outlook.live.com/mail/0/deeplink/compose?to=${config.to}&subject=${s}&body=${b}`
};

function openMail(type) {
  // アドレス無効エラーを避けるため、基本はWebベースのURLを開く
  // モバイル端末であれば、各アプリが自動的にハンドリングする場合が多いです
  window.open(mailLinks[type] || mailLinks.default, '_blank');
}
</script>

</head>

<body>

<div class="container">

  <div class="title">eyeサポテストメール</div>

  <div class="section-title">メールアプリ</div>

  <!-- 標準的なmailtoは最も安定しているためそのまま保持 -->
  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    iPhone純正メール <span class="arrow">›</span>
  </a>

  <div class="btn" onclick="openMail('gmail')">
    Gmail <span class="arrow">›</span>
  </div>

  <div class="btn" onclick="openMail('yahoo')">
    Yahoo!メール <span class="arrow">›</span>
  </div>

  <div class="btn" onclick="openMail('outlook')">
    Outlook <span class="arrow">›</span>
  </div>

  <div class="section-title">キャリアメール</div>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    ドコモメール <span class="arrow">›</span>
  </a>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    auメール <span class="arrow">›</span>
  </a>

  <a class="btn" href="mailto:customer-desk@hirocon-net.co.jp?subject=eyeサポテストメール&body=レンズを使用される方のお名前（漢字）%0A⇒%0A%0Aこちらはメールアドレス確認用のメールでございます。%0Aお名前をご入力いただき、そのまま送信をお願いいたします。">
    ソフトバンクメール <span class="arrow">›</span>
  </a>

  <div class="note">
    件名・本文はあらかじめ入力されております。<br>
    お名前をご入力のうえ、そのまま送信をお願いいたします。
  </div>

</div>

<div class="signature">
  HIROCON 豊橋店
</div>

</body>
</html>
